name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # -------------------
      # Checkout source
      # -------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------
      # Convert GitHub owner to lowercase
      # -------------------
      - name: Set lowercase owner
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # -------------------
      # Create image name
      # -------------------
      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${OWNER}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}" >> $GITHUB_ENV

      # -------------------
      # Docker Buildx
      # -------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------
      # Login to GitHub Container Registry
      # -------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: darsh1199
          password: ${{ secrets.GHCR_PAT }}

      # -------------------
      # Build Docker Image
      # -------------------
      - name: Build Image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }} \
            ./src/${{ inputs.service }}

      # -------------------
      # Scan Image with Trivy
      # -------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: "0"

      # -------------------
      # Push Docker Image
      # -------------------
      - name: Push Image
        run: |
          docker push ${{ env.IMAGE_NAME }}
